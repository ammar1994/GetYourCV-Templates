<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة تصميم السير الذاتية الاحترافية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #0f172a;
            --bg-surface: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-purple: #c084fc;
            --accent-gold: #fbbf24;
            --accent-green: #34d399;
            --accent-red: #f87171;
            --border-glow: rgba(192, 132, 252, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* بار علوي فخم */
        .premium-header {
            background: linear-gradient(90deg, #1e293b, #0f172a);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 100;
        }

        .brand-title {
            font-size: 1.4rem;
            font-weight: 900;
            background: linear-gradient(to left, var(--accent-purple), var(--accent-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .control-actions {
            display: flex;
            gap: 12px;
        }

        .prm-btn {
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-magic { background: linear-gradient(135deg, #6366f1, #a855f7); color: white; border: none; }
        .btn-magic:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(168, 85, 247, 0.4); }
        
        .btn-download { background-color: #10b981; color: white; border: none; }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }

        .btn-reset { background-color: rgba(244, 63, 94, 0.1); color: var(--accent-red); border: 1px solid rgba(244, 63, 94, 0.2); }
        .btn-reset:hover { background-color: rgba(244, 63, 94, 0.2); }

        /* حاوية العمل الرئيسية */
        .workspace {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* قسم التحكم الجانبي */
        .sidebar-editor {
            width: 420px;
            background-color: var(--bg-surface);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
        }

        /* تصنيف وهندسة القوالب */
        .category-wrapper {
            background: rgba(15, 23, 42, 0.4);
            padding: 16px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .panel-label {
            font-size: 0.85rem;
            color: var(--accent-gold);
            font-weight: 700;
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .template-matrix {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .matrix-btn {
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 14px;
            border-radius: 8px;
            text-align: right;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .matrix-btn:hover {
            background-color: #475569;
            border-color: var(--accent-purple);
        }

        .matrix-btn.active {
            background: linear-gradient(135deg, #4c1d95, #6d28d9);
            border-color: var(--accent-purple);
            box-shadow: 0 0 12px var(--border-glow);
            font-weight: 700;
        }

        /* حقول الإدخال الفخمة */
        .glass-section {
            background: rgba(15, 23, 42, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
        }

        .glass-section h3 {
            font-size: 1rem;
            color: var(--accent-purple);
            margin-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 8px;
            font-weight: 700;
        }

        .input-unit {
            margin-bottom: 14px;
        }

        .input-unit label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-unit input, .input-unit textarea {
            width: 100%;
            background-color: var(--bg-input);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-unit input:focus, .input-unit textarea:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 8px var(--border-glow);
            background-color: #475569;
        }

        /* مسرح العرض السيمائي للـ CV */
        .cinema-preview-zone {
            flex: 1;
            background-color: #0b0f19;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .cinema-preview-zone::before {
            content: 'معاينة حية للملف الفخم';
            position: absolute;
            top: 12px;
            left: 20px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 2px;
            font-weight: bold;
        }

        .luxury-iframe {
            width: 210mm;
            height: 297mm;
            background-color: #ffffff;
            border: none;
            border-radius: 8px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            transform-origin: top center;
            transition: transform 0.3s ease;
        }

        /* دعم التجاوب الكامل للهواتف الذكية */
        @media (max-width: 1024px) {
            body { overflow: auto; height: auto; }
            .workspace { flex-direction: column; }
            .sidebar-editor { width: 100%; height: auto; box-shadow: none; }
            .cinema-preview-zone { padding: 15px 5px; height: 520px; overflow-x: auto; }
            .luxury-iframe { transform: scale(0.45); }
        }
    </style>
</head>
<body>

    <header class="premium-header">
        <div class="brand-title">AMMAR BADAWIEH | STUDIO</div>
        <div class="control-actions">
            <button class="prm-btn btn-magic" onclick="loadDemoData()">✨ تعبئة ذكية للملف</button>
            <button class="prm-btn btn-reset" onclick="clearData()">تفريغ</button>
            <button class="prm-btn btn-download" onclick="printCV()">تصدير كملف جاهز للطباعة 📄</button>
        </div>
    </header>

    <div class="workspace">
        <div class="sidebar-editor">
            
            <div class="category-wrapper">
                <span class="panel-label">اختر تخصص القالب المستهدف:</span>
                <div class="template-matrix">
                    <button class="matrix-btn active" onclick="loadTemplate('index2.html', this)">قالب 1: النمط التنفيذي (للمهندسين والمعماريين)</button>
                    <button class="matrix-btn" onclick="loadTemplate('index4.html', this)">قالب 2: النمط العصري (للمبرمجين والتقنيين)</button>
                    <button class="matrix-btn" onclick="loadTemplate('index5.html', this)">قالب 3: النمط الإبداعي (للمصممين وصناع المحتوى)</button>
                    <button class="matrix-btn" onclick="loadTemplate('template3.html', this)">قالب 4: النمط الكلاسيكي (للأطباء والمحامين)</button>
                    <button class="matrix-btn" onclick="loadTemplate('template2_en.html', this)">قالب 5: النمط الأكاديمي الإنجليزي (للجامعيين)</button>
                    <button class="matrix-btn" onclick="loadTemplate('template3-en.html', this)">قالب 6: النمط المالي الإنجليزي (المحاسبة والإدارة)</button>
                    <button class="matrix-btn" onclick="loadTemplate('template4-en.html', this)">قالب 7: النمط الطبي الإنجليزي (المستشفيات والعلوم)</button>
                    <button class="matrix-btn" onclick="loadTemplate('template5-en.html', this)">قالب 8: النمط التقني الإنجليزي (هندسة البرمجيات)</button>
                </div>
            </div>

            <div class="glass-section">
                <h3>البيانات الأساسية</h3>
                <div class="input-unit"><label>الاسم الكامل</label><input type="text" id="in-name" oninput="sendDataToTemplate()" placeholder="مثال: سارة عبد الرحمن التميمي"></div>
                <div class="input-unit"><label>المسمى الوظيفي المستهدف</label><input type="text" id="in-title" oninput="sendDataToTemplate()" placeholder="مثال: مهندسة معمارية ومصممة مساحات"></div>
                <div class="input-unit"><label>الخلاصة الإبداعية / التنفيدية</label><textarea id="in-about" rows="4" oninput="sendDataToTemplate()" placeholder="نبذة تعكس قوتك وخبراتك..."></textarea></div>
            </div>

            <div class="glass-section">
                <h3>روابط التواصل السريع</h3>
                <div class="input-unit"><label>رقم الهاتف الدولي</label><input type="text" id="in-phone" oninput="sendDataToTemplate()" placeholder="+966 50 000 0000"></div>
                <div class="input-unit"><label>البريد الإلكتروني المهني</label><input type="text" id="in-email" oninput="sendDataToTemplate()" placeholder="name@domain.com"></div>
                <div class="input-unit"><label>رابط منصة الأعمال أو الموقع</label><input type="text" id="in-link" oninput="sendDataToTemplate()" placeholder="portfolio.com"></div>
            </div>

            <div class="glass-section">
                <h3>المسار المهني والأكاديمي</h3>
                <div class="input-unit"><label>الخبرات العملية السابقة</label><textarea id="in-experience" rows="5" oninput="sendDataToTemplate()" placeholder="الشركات والمسؤوليات البرمجية والتصميمية..."></textarea></div>
                <div class="input-unit"><label>المؤهلات العلمية</label><textarea id="in-education" rows="3" oninput="sendDataToTemplate()" placeholder="الشهادات الأكاديمية والجامعات..."></textarea></div>
            </div>

            <div class="glass-section">
                <h3>الجدارات الفنية</h3>
                <div class="input-unit"><label>المهارات الرئيسية (افصل بينها بـ , )</label><input type="text" id="in-skills" oninput="sendDataToTemplate()" placeholder="مثال: UI/UX, AutoCAD, HTML5, CSS Grid"></div>
            </div>

        </div>

        <div class="cinema-preview-zone">
            <iframe id="cv-frame" class="luxury-iframe" src="index2.html"></iframe>
        </div>
    </div>

    <script>
        function loadTemplate(fileName, buttonElement) {
            document.querySelectorAll('.matrix-btn').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            const iframe = document.getElementById('cv-frame');
            iframe.src = fileName;
            
            iframe.onload = function() { sendDataToTemplate(); };
        }

        function sendDataToTemplate() {
            const data = {
                name: document.getElementById('in-name').value,
                title: document.getElementById('in-title').value,
                about: document.getElementById('in-about').value,
                phone: document.getElementById('in-phone').value,
                email: document.getElementById('in-email').value,
                link: document.getElementById('in-link').value,
                experience: document.getElementById('in-experience').value,
                education: document.getElementById('in-education').value,
                skills: document.getElementById('in-skills').value
            };
            const iframe = document.getElementById('cv-frame');
            if(iframe.contentWindow) {
                iframe.contentWindow.postMessage(data, '*');
            }
        }

        function loadDemoData() {
            document.getElementById('in-name').value = 'سارة عبد الرحمن التميمي';
            document.getElementById('in-title').value = 'مهندسة معمارية ومصممة مساحات داخلية مستدامة';
            document.getElementById('in-about').value = 'مهندسة معمارية تمتلك شغفاً كبيراً في دمج الجمالية البسيطة والوظيفة العملية الكاملة، معتمدة على استغلال الإضاءة الطبيعية والمواد الصديقة للبيئة.';
            document.getElementById('in-phone').value = '+966 50 000 0000';
            document.getElementById('in-email').value = 'sara.architect@email.com';
            document.getElementById('in-link').value = 'sara-portfolio.vercel.app';
            document.getElementById('in-experience').value = 'مجموعة التصاميم الهندسية الكبرى:\nإدارة وتخطيط المساحات السكنية والتجارية الفاخرة والإشراف المباشر على التنفيذ.\n\nمكتب المخططون المستدامون:\nتطوير مجسمات ثلاثية الأبعاد وتقديم حلول معمارية ذكية حازت على رضا 95% من العملاء.';
            document.getElementById('in-education').value = 'بكالوريوس الهندسة المعمارية والتصميم الداخلي\nجامعة الملك سعود - مرتبة الشرف الأولى (2018 - 2023)';
            document.getElementById('in-skills').value = 'التخطيط المعماري, التصميم الداخلي, AutoCAD, 3ds Max, مهارات التواصل, إدارة المشاريع الهندسية';
            sendDataToTemplate();
        }

        function clearData() {
            document.getElementById('in-name').value = ''; document.getElementById('in-title').value = '';
            document.getElementById('in-about').value = ''; document.getElementById('in-phone').value = '';
            document.getElementById('in-email').value = ''; document.getElementById('in-link').value = '';
            document.getElementById('in-experience').value = ''; document.getElementById('in-education').value = '';
            document.getElementById('in-skills').value = '';
            sendDataToTemplate();
        }

        function printCV() {
            const iframe = document.getElementById('cv-frame');
            iframe.contentWindow.focus();
            iframe.contentWindow.print();
        }
    </script>
</body>
</html>
